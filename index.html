<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Mission Operations Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background Elements for Aesthetics -->
  <div class="glare glare-1"></div>
  <div class="glare glare-2"></div>

  <div class="dashboard-container">
    <header class="header neon-border glass">
      <div class="header-left">
        <div class="live-indicator">
          <div class="dot"></div>
          <span>LIVE TELEMETRY</span>
        </div>
        <h1>ISS MISSION <span class="accent">COMMAND</span></h1>
      </div>
      <div class="header-right">
        <div class="clock" id="utc-clock">00:00:00 UTC</div>
      </div>
    </header>
    <main class="grid-layout">
      <!-- MAP PANEL -->
      <section class="panel map-panel glass neon-border">
        <div class="panel-header">
          <h2>ORBITAL POSITION</h2>
        </div>
        <div id="map" class="map-container"></div>
      </section>
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <!-- TELEMETRY PANEL -->
        <section class="panel telemetry-panel glass neon-border">
          <div class="panel-header">
            <h2>FLIGHT DYNAMICS</h2>
          </div>
          <div class="telemetry-grid">
            <div class="data-box">
              <span class="label">ALTITUDE</span>
              <div class="value-container">
                <span class="value" id="alt-val">---</span>
                <span class="unit">km</span>
              </div>
            </div>
            <div class="data-box">
              <span class="label">VELOCITY</span>
              <div class="value-container">
                <span class="value" id="vel-val">---</span>
                <span class="unit">km/h</span>
              </div>
            </div>
            <div class="data-box">
              <span class="label">LATITUDE</span>
              <div class="value-container">
                <span class="value" id="lat-val">---</span>
                <span class="unit">&deg;</span>
              </div>
            </div>
            <div class="data-box">
              <span class="label">LONGITUDE</span>
              <div class="value-container">
                <span class="value" id="lon-val">---</span>
                <span class="unit">&deg;</span>
              </div>
            </div>
          </div>
        </section>
        <!-- CREW MANIFEST PANEL -->
        <section class="panel crew-panel glass neon-border">
          <div class="panel-header">
            <h2>CREW MANIFEST (<span id="crew-count">0</span>)</h2>
          </div>
          <div class="crew-list-container" id="crew-list">
            <!-- Dynamically populated via JS -->
            <div class="loading-text">Loading crew data...</div>
          </div>
        </section>
      </aside>
    </main>
  </div>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
